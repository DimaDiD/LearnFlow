name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-identity:
    name: Build Identity Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/services/identity/LearnFlow.Identity.API/LearnFlow.Identity.API.csproj

      - name: Build
        run: dotnet build src/services/identity/LearnFlow.Identity.API/LearnFlow.Identity.API.csproj --no-restore --configuration Release

      - name: Docker build check
        run: docker build -f src/services/identity/Dockerfile -t learnflow-identity:ci .

  build-courses:
    name: Build Courses Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/services/courses/LearnFlow.Courses.API/LearnFlow.Courses.API.csproj

      - name: Build
        run: dotnet build src/services/courses/LearnFlow.Courses.API/LearnFlow.Courses.API.csproj --no-restore --configuration Release

      - name: Docker build check
        run: docker build -f src/services/courses/Dockerfile -t learnflow-courses:ci .

  build-enrollments:
    name: Build Enrollments Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/services/enrollments/LearnFlow.Enrollments.API/LearnFlow.Enrollments.API.csproj

      - name: Build
        run: dotnet build src/services/enrollments/LearnFlow.Enrollments.API/LearnFlow.Enrollments.API.csproj --no-restore --configuration Release

      - name: Docker build check
        run: docker build -f src/services/enrollments/Dockerfile -t learnflow-enrollments:ci .

  build-progress:
    name: Build Progress Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/services/progress/LearnFlow.Progress.API/LearnFlow.Progress.API.csproj

      - name: Build
        run: dotnet build src/services/progress/LearnFlow.Progress.API/LearnFlow.Progress.API.csproj --no-restore --configuration Release

      - name: Docker build check
        run: docker build -f src/services/progress/Dockerfile -t learnflow-progress:ci .

  build-certificates:
    name: Build Certificates Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/services/certificates/LearnFlow.Certificates.API/LearnFlow.Certificates.API.csproj

      - name: Build
        run: dotnet build src/services/certificates/LearnFlow.Certificates.API/LearnFlow.Certificates.API.csproj --no-restore --configuration Release

      - name: Docker build check
        run: docker build -f src/services/certificates/Dockerfile -t learnflow-certificates:ci .

  build-search:
    name: Build Search Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/services/search/LearnFlow.Search.API/LearnFlow.Search.API.csproj

      - name: Build
        run: dotnet build src/services/search/LearnFlow.Search.API/LearnFlow.Search.API.csproj --no-restore --configuration Release

      - name: Docker build check
        run: docker build -f src/services/search/Dockerfile -t learnflow-search:ci .

  build-notifications:
    name: Build Notifications Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/services/notifications/LearnFlow.Notifications.API/LearnFlow.Notifications.API.csproj

      - name: Build
        run: dotnet build src/services/notifications/LearnFlow.Notifications.API/LearnFlow.Notifications.API.csproj --no-restore --configuration Release

      - name: Docker build check
        run: docker build -f src/services/notifications/Dockerfile -t learnflow-notifications:ci .

  build-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/services/gateway/LearnFlow.Gateway/LearnFlow.Gateway.csproj

      - name: Build
        run: dotnet build src/services/gateway/LearnFlow.Gateway/LearnFlow.Gateway.csproj --no-restore --configuration Release

      - name: Docker build check
        run: docker build -f src/services/gateway/Dockerfile -t learnflow-gateway:ci .

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/learnflow-app/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend/learnflow-app
        run: npm ci

      - name: Build
        working-directory: src/frontend/learnflow-app
        run: npm run build -- --configuration production

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - build-identity
      - build-courses
      - build-enrollments
      - build-progress
      - build-certificates
      - build-search
      - build-notifications
      - build-gateway
      - build-frontend
    steps:
      - name: All checks passed
        run: echo "CI passed successfully"