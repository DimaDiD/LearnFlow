name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      identity: ${{ steps.changes.outputs.identity }}
      courses: ${{ steps.changes.outputs.courses }}
      enrollments: ${{ steps.changes.outputs.enrollments }}
      progress: ${{ steps.changes.outputs.progress }}
      certificates: ${{ steps.changes.outputs.certificates }}
      search: ${{ steps.changes.outputs.search }}
      notifications: ${{ steps.changes.outputs.notifications }}
      gateway: ${{ steps.changes.outputs.gateway }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            identity:
              - 'src/services/identity/**'
              - 'src/shared/**'
            courses:
              - 'src/services/courses/**'
              - 'src/shared/**'
            enrollments:
              - 'src/services/enrollments/**'
              - 'src/shared/**'
            progress:
              - 'src/services/progress/**'
              - 'src/shared/**'
            certificates:
              - 'src/services/certificates/**'
              - 'src/shared/**'
            search:
              - 'src/services/search/**'
              - 'src/shared/**'
            notifications:
              - 'src/services/notifications/**'
              - 'src/shared/**'
            gateway:
              - 'src/services/gateway/**'
            frontend:
              - 'src/frontend/**'

  build-backend:
    name: Build ${{ matrix.service.display_name }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: identity
            display_name: Identity Service
            path: src/services/identity
            project: LearnFlow.Identity.API
          - name: courses
            display_name: Courses Service
            path: src/services/courses
            project: LearnFlow.Courses.API
          - name: enrollments
            display_name: Enrollments Service
            path: src/services/enrollments
            project: LearnFlow.Enrollments.API
          - name: progress
            display_name: Progress Service
            path: src/services/progress
            project: LearnFlow.Progress.API
          - name: certificates
            display_name: Certificates Service
            path: src/services/certificates
            project: LearnFlow.Certificates.API
          - name: search
            display_name: Search Service
            path: src/services/search
            project: LearnFlow.Search.API
          - name: notifications
            display_name: Notifications Service
            path: src/services/notifications
            project: LearnFlow.Notifications.API
          - name: gateway
            display_name: API Gateway
            path: src/services/gateway
            project: LearnFlow.Gateway

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ matrix.service.name }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ matrix.service.name }}-
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.service.path }}/${{ matrix.service.project }}/${{ matrix.service.project }}.csproj

      - name: Build
        run: |
          dotnet build ${{ matrix.service.path }}/${{ matrix.service.project }}/${{ matrix.service.project }}.csproj \
            --no-restore \
            --configuration Release

      - name: Docker build check
        run: |
          docker build \
            -f ${{ matrix.service.path }}/Dockerfile \
            -t learnflow-${{ matrix.service.name }}:ci-${{ github.sha }} \
            .

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/learnflow-app/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend/learnflow-app
        run: npm ci

      - name: Build production
        working-directory: src/frontend/learnflow-app
        run: npm run build -- --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/learnflow-app/dist/
          retention-days: 7

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.build-backend.result }}" == "failure" || "${{ needs.build-frontend.result }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed successfully"