name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      backend-matrix: ${{ steps.set-matrix.outputs.matrix }}
      backend-empty: ${{ steps.set-matrix.outputs.empty }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            shared:
              - 'src/shared/**'
            identity:
              - 'src/services/identity/**'
            courses:
              - 'src/services/courses/**'
            enrollments:
              - 'src/services/enrollments/**'
            progress:
              - 'src/services/progress/**'
            certificates:
              - 'src/services/certificates/**'
            search:
              - 'src/services/search/**'
            notifications:
              - 'src/services/notifications/**'
            gateway:
              - 'src/services/gateway/**'
            frontend:
              - 'src/frontend/**'

      - name: Build matrix from changes
        id: set-matrix
        run: |
          # Повний опис усіх сервісів
          declare -A services=(
            [identity]="Identity Service|src/services/identity|LearnFlow.Identity.API"
            [courses]="Courses Service|src/services/courses|LearnFlow.Courses.API"
            [enrollments]="Enrollments Service|src/services/enrollments|LearnFlow.Enrollments.API"
            [progress]="Progress Service|src/services/progress|LearnFlow.Progress.API"
            [certificates]="Certificates Service|src/services/certificates|LearnFlow.Certificates.API"
            [search]="Search Service|src/services/search|LearnFlow.Search.API"
            [notifications]="Notifications Service|src/services/notifications|LearnFlow.Notifications.API"
            [gateway]="API Gateway|src/services/gateway|LearnFlow.Gateway"
          )

          # Чи треба білдити все? (зміна shared, push в main/develop)
          BUILD_ALL=false
          if [[ "${{ steps.changes.outputs.shared }}" == "true" ]]; then
            BUILD_ALL=true
          fi
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/develop" ]]; then
            BUILD_ALL=true
          fi

          # Які сервіси змінились
          declare -A changed=(
            [identity]="${{ steps.changes.outputs.identity }}"
            [courses]="${{ steps.changes.outputs.courses }}"
            [enrollments]="${{ steps.changes.outputs.enrollments }}"
            [progress]="${{ steps.changes.outputs.progress }}"
            [certificates]="${{ steps.changes.outputs.certificates }}"
            [search]="${{ steps.changes.outputs.search }}"
            [notifications]="${{ steps.changes.outputs.notifications }}"
            [gateway]="${{ steps.changes.outputs.gateway }}"
          )

          # Будуємо JSON масив
          items=()
          for name in "${!services[@]}"; do
            if [[ "$BUILD_ALL" == "true" || "${changed[$name]}" == "true" ]]; then
              IFS='|' read -r display path project <<< "${services[$name]}"
              items+=("{\"name\":\"$name\",\"display_name\":\"$display\",\"path\":\"$path\",\"project\":\"$project\"}")
            fi
          done

          # Збираємо в JSON
          if [ ${#items[@]} -eq 0 ]; then
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            json=$(IFS=,; echo "${items[*]}")
            echo "matrix={\"service\":[$json]}" >> $GITHUB_OUTPUT
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Print matrix
        run: |
          echo "Matrix: ${{ steps.set-matrix.outputs.matrix }}"
          echo "Empty: ${{ steps.set-matrix.outputs.empty }}"

  build-backend:
    name: Build ${{ matrix.service.display_name }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend-empty == 'false'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.backend-matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ matrix.service.name }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ matrix.service.name }}-
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.service.path }}/${{ matrix.service.project }}/${{ matrix.service.project }}.csproj

      - name: Build
        run: |
          dotnet build ${{ matrix.service.path }}/${{ matrix.service.project }}/${{ matrix.service.project }}.csproj \
            --no-restore \
            --configuration Release

      - name: Docker build check
        run: |
          docker build \
            -f ${{ matrix.service.path }}/Dockerfile \
            -t learnflow-${{ matrix.service.name }}:ci-${{ github.sha }} \
            .

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/learnflow-app/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend/learnflow-app
        run: npm ci

      - name: Build production
        working-directory: src/frontend/learnflow-app
        run: npm run build -- --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/learnflow-app/dist/
          retention-days: 7

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    if: always()
    steps:
      - name: Check results
        run: |
          backend="${{ needs.build-backend.result }}"
          frontend="${{ needs.build-frontend.result }}"

          echo "Backend: $backend"
          echo "Frontend: $frontend"

          # failure = провал. success/skipped = ок
          if [[ "$backend" == "failure" || "$frontend" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi

          echo "CI passed successfully"